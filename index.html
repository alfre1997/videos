<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Sniper v5 | Deep Crawler & File Import</title>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --accent: #8b5cf6;
            --text: #ececec; --border: #27272a; --video: #10b981;
            --ad: #ef4444; --player: #3b82f6; --script: #eab308;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 1000px; margin: auto; }
        
        .panel { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 12px; margin-bottom: 15px;
        }

        /* Zona de Carga de Archivos */
        .drop-zone {
            border: 2px dashed var(--accent);
            padding: 25px;
            text-align: center;
            border-radius: 10px;
            background: rgba(139, 92, 246, 0.05);
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .drop-zone:hover { background: rgba(139, 92, 246, 0.1); }
        input[type="file"] { display: none; }

        textarea { 
            width: 100%; height: 120px; background: #000; color: #10b981; 
            border: 1px solid var(--border); border-radius: 8px; padding: 12px;
            font-family: monospace; font-size: 13px; margin-top: 10px;
        }

        .btn { 
            width: 100%; padding: 14px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        .btn-extract { background: var(--accent); color: white; }

        /* Categorías y Tabla */
        .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .stat-item { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; border: 1px solid var(--border); background: var(--card); }

        .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #27272a; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid var(--border); word-break: break-all; }

        .tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; white-space: nowrap; display: inline-block; margin-bottom: 4px; }
        .tag-video { background: rgba(16, 185, 129, 0.2); color: var(--video); }
        .tag-m3u { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
        .tag-ad { background: rgba(239, 68, 68, 0.2); color: var(--ad); }
        .tag-player { background: rgba(59, 130, 246, 0.2); color: var(--player); }
        .tag-js { background: rgba(234, 179, 8, 0.2); color: var(--script); }

        .copy-btn { background: #3f3f46; color: white; padding: 4px; border-radius: 4px; cursor: pointer; border: none; font-size: 9px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2 style="margin:0 0 15px 0; font-size: 1.1rem; text-align: center; color: var(--accent);">🔍 CRAWLER MAESTRO</h2>
        
        <label class="drop-zone" id="dropArea">
            <span id="labelTxt">📁 Arrastra el código fuente o clic aquí</span>
            <input type="file" id="fileInput" accept=".html,.txt,.xml,.js">
        </label>

        <textarea id="sourceInput" placeholder="O pega el código directamente aquí..."></textarea>
        
        <button class="btn btn-extract" onclick="runCrawl()">Analizar y Clasificar Todo</button>
    </div>

    <div id="statsArea" class="stats"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th width="20%">TIPO</th>
                    <th width="70%">ENLACE</th>
                    <th width="10%">MÁS</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const labelTxt = document.getElementById('labelTxt');

    fileInput.onchange = e => {
        if(e.target.files[0]) labelTxt.innerText = "📄 " + e.target.files[0].name;
    };

    async function runCrawl() {
        let content = document.getElementById('sourceInput').value;
        const file = fileInput.files[0];

        if (file) content = await file.text();
        if (!content) return alert("Sube un archivo o pega el código.");

        const urlRegex = /(https?:\/\/[^\s"'<>\]]+)/g;
        const matches = content.match(urlRegex) || [];
        const uniqueLinks = [...new Set(matches)];

        const resultsBody = document.getElementById('resultsBody');
        resultsBody.innerHTML = "";
        const c = { m3u: 0, video: 0, player: 0, ad: 0, script: 0, other: 0 };

        uniqueLinks.forEach(link => {
            const clean = link.split(/[\\"']/)[0];
            const info = categorize(clean);
            c[info.key]++;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="tag ${info.class}">${info.label}</span></td>
                <td><a href="${clean}" target="_blank" style="color:#38bdf8; text-decoration:none;">${clean}</a></td>
                <td><button class="copy-btn" onclick="navigator.clipboard.writeText('${clean}');alert('Copiado')">CLIP</button></td>
            `;
            resultsBody.appendChild(row);
        });

        updateStats(c);
    }

    function categorize(u) {
        const l = u.toLowerCase();
        if (l.includes('.m3u8') || l.includes('master.m3u8') || l.includes('.mpd')) 
            return { label: 'STREAMING', class: 'tag-m3u', key: 'm3u' };
        if (l.match(/\.(mp4|mkv|webm|ts)/)) 
            return { label: 'VIDEO', class: 'tag-video', key: 'video' };
        if (l.includes('player') || l.includes('vjs') || l.includes('jwplayer')) 
            return { label: 'PLAYER', class: 'tag-player', key: 'player' };
        if (l.match(/(betwinner|adangle|ads|vast|tracking|pixel|agl003|spix)/)) 
            return { label: 'AD/TRACKER', class: 'tag-ad', key: 'ad' };
        if (l.endsWith('.js') || l.includes('.min.js')) 
            return { label: 'JS SCRIPT', class: 'tag-js', key: 'script' };
        return { label: 'ENLACE', class: '', key: 'other' };
    }

    function updateStats(c) {
        document.getElementById('statsArea').innerHTML = `
            <span class="stat-item">🎬 M3U8: ${c.m3u}</span>
            <span class="stat-item">🎥 Videos: ${c.video}</span>
            <span class="stat-item">📢 Ads: ${c.ad}</span>
            <span class="stat-item">⚙️ JS: ${c.script}</span>
        `;
    }
</script>
</body>
</html>
